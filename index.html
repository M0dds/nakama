<!doctype html>
<html lang="de" data-theme="default" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Media-Tracker für Anime, Manga, Serien, Filme, Spiele — gemeinsam schauen."
    />
    <!-- PWA / browser chrome colour. Seeded to the default theme's background
         so the status bar isn't a stray red before JS runs; themes.ts
         (syncFavicon + applyTheme) repaints it to the live theme on mount. The
         bootstrap below swaps to the dark default when dark mode resolves. -->
    <meta name="theme-color" content="#f7f6f3" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS home-screen icon (PNG; iOS ignores SVG apple-touch-icons). -->
    <link rel="apple-touch-icon" href="/pwa-icon-180.png" />
    <meta name="apple-mobile-web-app-title" content="Nakama" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Nakama</title>
    <!--
      Theme bootstrap — runs before React mounts so the page never flashes the
      default theme. Reads localStorage; falls back to default + system mode.
    -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem("nakama:theme") || "default";
          root.setAttribute("data-theme", theme);
          var pref = localStorage.getItem("nakama:mode") || "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) root.classList.add("dark");
          // Match the chrome colour to the resolved mode of the DEFAULT theme
          // (the common case) so a dark launch doesn't flash a light bar; any
          // non-default theme is corrected a frame later by syncFavicon().
          if (dark) {
            var tc = document.querySelector('meta[name="theme-color"]');
            if (tc) tc.setAttribute("content", "#0c0c0c");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
